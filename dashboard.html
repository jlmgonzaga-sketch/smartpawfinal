<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#fff8f0">
<title>SmartPaw — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>

/* ── CAMERA HERO ── */
.cam-hero {
  position: relative;
  width: 100%;
  aspect-ratio: 4/3;
  background: linear-gradient(135deg, #ffe4c8 0%, #ffd4a8 100%);
  border-radius: 28px;
  overflow: hidden;
  margin-bottom: 16px;
  border: 3px solid #ffb97a;
  box-shadow: 0 8px 32px rgba(255,140,60,0.18);
}

.cam-feed {
  width: 100%; height: 100%;
  object-fit: cover;
  display: none;
}
.cam-feed.active { display: block; }

.cam-placeholder {
  width: 100%; height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
}
.cam-placeholder-icon {
  font-size: 64px;
  animation: float 3s ease-in-out infinite;
}
@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}
.cam-placeholder-text {
  font-family: var(--display);
  font-size: 16px;
  color: #c8844a;
  font-weight: 600;
}

.cam-overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
}

/* Live badge */
.cam-badge {
  position: absolute;
  top: 14px; left: 14px;
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(8px);
  border-radius: 20px;
  padding: 5px 12px;
  font-family: var(--display);
  font-size: 12px;
  font-weight: 700;
  color: #d95a2a;
}
.cam-badge.live { color: #16a34a; }
.live-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #d95a2a;
}
.cam-badge.live .live-dot {
  background: #16a34a;
  animation: livepulse 1.2s infinite;
}
@keyframes livepulse {
  0%,100% { opacity:1; transform:scale(1); }
  50% { opacity:0.4; transform:scale(0.7); }
}

/* Pet name + time on camera */
.cam-info {
  position: absolute;
  bottom: 14px; left: 14px; right: 14px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
}
.cam-pet-name {
  background: rgba(255,255,255,0.88);
  backdrop-filter: blur(8px);
  border-radius: 14px;
  padding: 8px 14px;
  font-family: var(--display);
  font-weight: 700;
  font-size: 18px;
  color: #7c3a10;
  display: flex;
  align-items: center;
  gap: 6px;
}
.cam-time-badge {
  background: rgba(255,255,255,0.88);
  backdrop-filter: blur(8px);
  border-radius: 12px;
  padding: 6px 10px;
  font-family: var(--body);
  font-size: 11px;
  font-weight: 600;
  color: #a05a2a;
}

/* ── PET STATUS CARD ── */
.pet-status-card {
  background: linear-gradient(135deg, #fff3e6, #ffe8cc);
  border: 2px solid #ffcb8a;
  border-radius: 22px;
  padding: 18px 20px;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 16px;
  box-shadow: 0 4px 16px rgba(255,140,60,0.12);
}
.pet-avatar {
  width: 64px; height: 64px;
  border-radius: 50%;
  background: linear-gradient(135deg, #ffb347, #ff8c42);
  display: flex; align-items: center; justify-content: center;
  font-size: 32px;
  flex-shrink: 0;
  box-shadow: 0 4px 12px rgba(255,140,60,0.3);
  position: relative;
}
.pet-status-dot {
  position: absolute;
  bottom: 2px; right: 2px;
  width: 16px; height: 16px;
  border-radius: 50%;
  border: 2px solid #fff3e6;
  background: #d1d5db;
}
.pet-status-dot.at-feeder { background: #22c55e; animation: livepulse 1.5s infinite; }
.pet-status-dot.away { background: #94a3b8; }

.pet-status-info { flex: 1; }
.pet-status-name {
  font-family: var(--display);
  font-size: 20px;
  font-weight: 700;
  color: #7c3a10;
  line-height: 1;
  margin-bottom: 4px;
}
.pet-status-label {
  font-family: var(--body);
  font-size: 13px;
  color: #b06030;
  font-weight: 600;
}
.pet-status-time {
  font-size: 11px;
  color: #c8844a;
  margin-top: 2px;
}
.pet-status-emoji {
  font-size: 32px;
}

/* ── STATS ROW ── */
.stats-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 14px;
}

.stat-bubble {
  background: white;
  border-radius: 20px;
  padding: 16px;
  text-align: center;
  border: 2px solid #ffe4c8;
  box-shadow: 0 2px 12px rgba(255,140,60,0.08);
  position: relative;
  overflow: hidden;
}
.stat-bubble::before {
  content: '';
  position: absolute;
  top: -20px; right: -20px;
  width: 60px; height: 60px;
  border-radius: 50%;
  opacity: 0.08;
}
.stat-bubble.food::before { background: #f97316; }
.stat-bubble.meals::before { background: #22c55e; }

.stat-icon { font-size: 24px; margin-bottom: 6px; }
.stat-num {
  font-family: var(--display);
  font-size: 28px;
  font-weight: 700;
  color: #7c3a10;
  line-height: 1;
}
.stat-num .unit { font-size: 14px; font-weight: 500; color: #b06030; }
.stat-name {
  font-size: 11px;
  color: #c8844a;
  font-weight: 600;
  margin-top: 3px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

/* Food level ring */
.food-ring-wrap {
  position: relative;
  width: 56px; height: 56px;
  margin: 0 auto 4px;
}
.food-ring-wrap svg { transform: rotate(-90deg); }
.food-ring-bg { fill: none; stroke: #ffe4c8; stroke-width: 5; }
.food-ring-fill { fill: none; stroke: #f97316; stroke-width: 5; stroke-linecap: round; transition: stroke-dashoffset 0.8s ease; }
.food-ring-label {
  position: absolute;
  inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--display);
  font-size: 13px;
  font-weight: 700;
  color: #7c3a10;
}

/* ── PORTION PILLS ── */
.portion-pill {
  flex: 1;
  padding: 9px 4px;
  border-radius: 12px;
  border: 2px solid var(--border);
  background: white;
  font-family: var(--body);
  font-size: 13px;
  font-weight: 700;
  color: var(--brown-light);
  cursor: pointer;
  transition: all 0.18s;
}
.portion-pill.active {
  background: linear-gradient(135deg, #fff3e6, #ffddb8);
  border-color: var(--orange-light);
  color: var(--orange);
}
.portion-pill:hover:not(.active) { background: var(--warm1); }

/* ── FEED BUTTON ── */
.feed-btn-wrap { margin-bottom: 14px; }
.feed-btn {
  width: 100%;
  padding: 20px;
  background: linear-gradient(135deg, #ff8c42, #f97316);
  color: white;
  border: none;
  border-radius: 22px;
  font-family: var(--display);
  font-size: 20px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  box-shadow: 0 6px 24px rgba(249,115,22,0.35);
  letter-spacing: 0.02em;
  position: relative;
  overflow: hidden;
}
.feed-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(249,115,22,0.45); }
.feed-btn:active { transform: scale(0.98); }
.feed-btn:disabled { background: #e2d5c8; color: #b0a090; box-shadow: none; cursor: not-allowed; transform: none; }
.feed-btn-icon { font-size: 26px; }

.feed-btn .shine {
  position: absolute;
  top: 0; left: -100%;
  width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
  animation: shine 2.5s infinite;
}
@keyframes shine {
  0% { left: -100%; }
  40%,100% { left: 150%; }
}

/* ── LAST FEED ── */
.last-feed-card {
  background: white;
  border: 2px solid #ffe4c8;
  border-radius: 18px;
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: 0 2px 10px rgba(255,140,60,0.07);
}
.last-feed-icon {
  width: 44px; height: 44px;
  background: linear-gradient(135deg, #fef3c7, #fde68a);
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}
.last-feed-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: #c8844a;
  margin-bottom: 3px;
}
.last-feed-val {
  font-family: var(--display);
  font-size: 15px;
  font-weight: 600;
  color: #7c3a10;
}
.last-feed-time {
  font-size: 11px;
  color: #b06030;
  margin-top: 1px;
}

/* Refresh ring */
.refresh-pill {
  display: flex;
  align-items: center;
  gap: 8px;
  justify-content: center;
  padding: 8px;
  font-size: 11px;
  color: #c8844a;
  font-weight: 600;
  margin-top: 12px;
}
.refresh-ring {
  width: 16px; height: 16px;
  border: 2px solid #ffe4c8;
  border-top-color: #f97316;
  border-radius: 50%;
  flex-shrink: 0;
}
.refresh-ring.spinning { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

</style>
</head>
<body>

<div class="page-wrap">

  <!-- TOP BAR -->
  <header class="topbar">
    <div class="topbar-left">
      <span class="logo">🐾 SmartPaw</span>
    </div>
    <div class="conn-pill" id="connPill">
      <div class="conn-dot" id="connDot"></div>
      <span id="connLabel">Offline</span>
    </div>
  </header>

  <!-- CONTENT -->
  <main class="content">

    <!-- Camera Hero -->
    <div class="cam-hero">
      <img class="cam-feed" id="camFeed" src="" alt="Camera feed">
      <div class="cam-placeholder" id="camPlaceholder">
        <div class="cam-placeholder-icon">🐶</div>
        <div class="cam-placeholder-text">Camera not connected</div>
      </div>
      <div class="cam-overlay">
        <div class="cam-badge" id="camBadge">
          <div class="live-dot"></div>
          <span id="camBadgeText">NO SIGNAL</span>
        </div>
        <div class="cam-info">
          <div class="cam-pet-name">🐾 <span id="camPetName">My Pet</span></div>
          <div class="cam-time-badge" id="camTime">--:--</div>
        </div>
      </div>
    </div>

    <!-- Pet Status -->
    <div class="pet-status-card" id="petCard">
      <div class="pet-avatar">
        🐶
        <div class="pet-status-dot away" id="petDot"></div>
      </div>
      <div class="pet-status-info">
        <div class="pet-status-name" id="petStatusName">Not detected</div>
        <div class="pet-status-label" id="petStatusLabel">Waiting for your pet…</div>
        <div class="pet-status-time" id="petStatusTime">Last seen: —</div>
      </div>
      <div class="pet-status-emoji" id="petStatusEmoji">😴</div>
    </div>

    <!-- Stats Row -->
    <div class="stats-row">
      <div class="stat-bubble food">
        <div class="food-ring-wrap">
          <svg viewBox="0 0 56 56" width="56" height="56">
            <circle class="food-ring-bg" cx="28" cy="28" r="23"/>
            <circle class="food-ring-fill" id="foodRing" cx="28" cy="28" r="23"
              stroke-dasharray="144.5" stroke-dashoffset="144.5"/>
          </svg>
          <div class="food-ring-label" id="foodPct">0%</div>
        </div>
        <div class="stat-name">Food Level</div>
        <div style="font-size:12px;color:#b06030;margin-top:2px" id="foodGrams">— g</div>
      </div>
      <div class="stat-bubble meals">
        <div class="stat-icon">🍽️</div>
        <div class="stat-num" id="mealCount">0</div>
        <div class="stat-name">Meals Today</div>
      </div>
    </div>

    <!-- Feed Button -->
    <div class="feed-btn-wrap">
      <!-- Portion Picker -->
      <div style="display:flex;gap:8px;margin-bottom:10px">
        <button class="portion-pill" onclick="setPortion(this,30)">30g</button>
        <button class="portion-pill active" onclick="setPortion(this,50)">50g</button>
        <button class="portion-pill" onclick="setPortion(this,80)">80g</button>
        <button class="portion-pill" onclick="setPortion(this,100)">100g</button>
      </div>
      <button class="feed-btn" id="feedBtn" onclick="manualFeed()">
        <div class="shine"></div>
        <span class="feed-btn-icon">🥣</span>
        <span id="feedBtnLabel">Feed Now! · 50g</span>
      </button>
    </div>

    <!-- Last Feeding -->
    <div class="last-feed-card">
      <div class="last-feed-icon">⏱️</div>
      <div>
        <div class="last-feed-label">Last Feeding</div>
        <div class="last-feed-val" id="lastFeedVal">No feedings yet</div>
        <div class="last-feed-time" id="lastFeedTime">—</div>
      </div>
    </div>

    <!-- Refresh status -->
    <div class="refresh-pill">
      <div class="refresh-ring" id="refreshRing"></div>
      <span id="refreshLabel">Not syncing — configure Adafruit IO</span>
    </div>

  </main>

  <!-- NAV -->
  <nav class="bottom-nav">
    <a href="dashboard.html" class="nav-item active">
      <span class="nav-icon">🏠</span>
      <span>Home</span>
    </a>
    <a href="log.html" class="nav-item">
      <span class="nav-icon">📋</span>
      <span>Log</span>
    </a>
    <a href="schedule.html" class="nav-item">
      <span class="nav-icon">⏰</span>
      <span>Schedule</span>
    </a>
    <a href="config.html" class="nav-item">
      <span class="nav-icon">⚙️</span>
      <span>Settings</span>
    </a>
  </nav>

</div>

<div class="toast" id="toast"></div>

<script src="shared.js"></script>
<script>
const POLL_MS = 15000;
let pollTimer = null;
let pollCountdown = null;
let secondsLeft = POLL_MS / 1000;
let selectedPortion = 50;

function setPortion(btn, grams) {
  selectedPortion = grams;
  document.querySelectorAll('.portion-pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('feedBtnLabel').textContent = `Feed Now! · ${grams}g`;
}

function init() {
  updateClock();
  setInterval(updateClock, 1000);
  renderLastFeed();
  countMealsToday();

  if (cfg.username && cfg.apiKey) {
    fetchAll();
    pollTimer = setInterval(fetchAll, POLL_MS);
    startCountdown();
  } else {
    document.getElementById('refreshLabel').textContent = 'Configure Settings to connect';
  }
}

function updateClock() {
  const t = new Date().toLocaleTimeString('en-PH', { hour: '2-digit', minute: '2-digit' });
  document.getElementById('camTime').textContent = t;
}

function startCountdown() {
  secondsLeft = POLL_MS / 1000;
  if (pollCountdown) clearInterval(pollCountdown);
  pollCountdown = setInterval(() => {
    secondsLeft--;
    if (secondsLeft <= 0) secondsLeft = POLL_MS / 1000;
    document.getElementById('refreshLabel').textContent = `Refreshing in ${secondsLeft}s`;
  }, 1000);
  document.getElementById('refreshRing').classList.add('spinning');
}

async function fetchAll() {
  if (!cfg.username || !cfg.apiKey) return;
  try {
    const [food, pet] = await Promise.all([
      aioGet(cfg.foodFeed).catch(() => null),
      aioGet(cfg.petFeed).catch(() => null),
    ]);
    if (food) setFood(parseFloat(food.value));
    if (pet) setPet(parseInt(pet.value));
    setOnline(true);
    checkSchedules();
  } catch(e) {
    setOnline(false);
  }
}

function setFood(grams) {
  const max = 500;
  const pct = Math.min(100, Math.max(0, Math.round((grams / max) * 100)));
  const circ = 2 * Math.PI * 23;
  const offset = circ - (pct / 100) * circ;
  document.getElementById('foodRing').style.strokeDashoffset = offset;
  document.getElementById('foodPct').textContent = pct + '%';
  document.getElementById('foodGrams').textContent = Math.round(grams) + 'g';
  // Color ring by level
  const ring = document.getElementById('foodRing');
  ring.style.stroke = pct > 50 ? '#22c55e' : pct > 20 ? '#f97316' : '#ef4444';
}

function setPet(detected) {
  const dot = document.getElementById('petDot');
  const name = document.getElementById('petStatusName');
  const label = document.getElementById('petStatusLabel');
  const emoji = document.getElementById('petStatusEmoji');
  const card = document.getElementById('petCard');
  if (detected) {
    dot.className = 'pet-status-dot at-feeder';
    name.textContent = cfg.petName || 'Your pet is here!';
    label.textContent = 'At the feeder 🎉';
    emoji.textContent = '😋';
    card.style.background = 'linear-gradient(135deg, #dcfce7, #bbf7d0)';
    card.style.borderColor = '#86efac';
  } else {
    dot.className = 'pet-status-dot away';
    name.textContent = 'Not at feeder';
    label.textContent = 'Waiting for your pet…';
    emoji.textContent = '😴';
    card.style.background = 'linear-gradient(135deg, #fff3e6, #ffe8cc)';
    card.style.borderColor = '#ffcb8a';
  }
}

function setOnline(on) {
  document.getElementById('connDot').className = 'conn-dot ' + (on ? 'online' : '');
  document.getElementById('connLabel').textContent = on ? 'Live' : 'Offline';
}

function countMealsToday() {
  const today = new Date().toDateString();
  const count = log.filter(e => new Date(e.time).toDateString() === today).length;
  document.getElementById('mealCount').textContent = count;
}

function renderLastFeed() {
  if (log.length > 0) {
    const e = log[0];
    document.getElementById('lastFeedVal').textContent = e.title + ' · ' + e.amount;
    document.getElementById('lastFeedTime').textContent = e.displayTime;
  }
}

async function manualFeed() {
  const btn = document.getElementById('feedBtn');
  if (!cfg.username || !cfg.apiKey) {
    showToast('⚙️ Configure Settings first!', 'warn');
    return;
  }
  btn.disabled = true;
  btn.innerHTML = `<div class="shine"></div><span class="feed-btn-icon">⏳</span> Sending…`;
  try {
    await aioPost(cfg.dispenseFeed, 1);
    addLog('Manual Feed 🥣', selectedPortion + 'g', 'manual');
    countMealsToday();
    renderLastFeed();
    btn.innerHTML = `<div class="shine"></div><span class="feed-btn-icon">✅</span> Sent!`;
    showToast(`🥣 ${selectedPortion}g dispensed!`, 'ok');
    setTimeout(() => {
      btn.disabled = false;
      btn.innerHTML = `<div class="shine"></div><span class="feed-btn-icon">🥣</span><span id="feedBtnLabel">Feed Now! · ${selectedPortion}g</span>`;
    }, 2500);
  } catch(e) {
    showToast('❌ Failed: ' + e.message, 'err');
    btn.disabled = false;
    btn.innerHTML = `<div class="shine"></div><span class="feed-btn-icon">🥣</span><span id="feedBtnLabel">Feed Now! · ${selectedPortion}g</span>`;
  }
}

// Camera stream with retry
let camRetryTimer = null;
let camRetryCount = 0;
const CAM_MAX_RETRIES = 5;

function initCamera() {
  const url = cfg.camUrl;
  if (!url) return;
  loadCamFrame(url);
}

function loadCamFrame(url) {
  const img = document.getElementById('camFeed');
  const placeholder = document.getElementById('camPlaceholder');
  const badge = document.getElementById('camBadge');
  const badgeText = document.getElementById('camBadgeText');

  // Bust cache so the stream reloads fresh on retry
  img.src = url + (url.includes('?') ? '&' : '?') + '_t=' + Date.now();

  img.onload = () => {
    img.classList.add('active');
    placeholder.style.display = 'none';
    badge.classList.add('live');
    badgeText.textContent = 'LIVE';
    camRetryCount = 0; // reset on success
    if (camRetryTimer) { clearTimeout(camRetryTimer); camRetryTimer = null; }
  };

  img.onerror = () => {
    img.classList.remove('active');
    placeholder.style.display = 'flex';
    badge.classList.remove('live');

    if (camRetryCount < CAM_MAX_RETRIES) {
      camRetryCount++;
      const wait = Math.min(5000 * camRetryCount, 30000); // back-off up to 30s
      badgeText.textContent = `RETRY ${camRetryCount}/${CAM_MAX_RETRIES}`;
      placeholder.innerHTML = `
        <div class="cam-placeholder-icon">📡</div>
        <div class="cam-placeholder-text">Reconnecting… (${camRetryCount}/${CAM_MAX_RETRIES})</div>`;
      camRetryTimer = setTimeout(() => loadCamFrame(url), wait);
    } else {
      badgeText.textContent = 'NO SIGNAL';
      placeholder.innerHTML = `
        <div class="cam-placeholder-icon">📷</div>
        <div class="cam-placeholder-text">Camera offline</div>`;
    }
  };
}

init();
initCamera();
</script>
</body>
</html>
